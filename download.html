  <div class="ssh-global-player" id="ssh-global-player">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-auto">
          <button class="ssh-player-btn" id="ssh-global-play-btn">
            <i class="fa-solid fa-play"></i>
          </button>
        </div>
        <div class="col-md-3 col-12 my-2 my-md-0">
          <div class="ssh-player-title text-info fw-bold" id="ssh-player-title">Track Title</div>
          <div class="text-info small" id="ssh-player-genre">Genre Info</div>
        </div>
        <div class="col">
          <div class="d-flex align-items-center">
            <span class="small text-secondary me-2" id="ssh-current-time">0:00</span>

            </div>
            <span class="small text-secondary ms-2" id="ssh-total-time">0:00</span>
          </div>
        </div>
        <div class="col-auto d-flex align-items-center me-2" id="ssh-volume-section">
          <i class="fa-solid fa-volume-high text-secondary me-2" id="ssh-volume-icon"></i>
          <input type="range" class="form-range" id="ssh-volume-slider" min="0" max="1" step="0.05" value="0.5" style="width: 80px; cursor: pointer;">
        </div>
        <div class="col-auto">
          <button class="btn btn-sm text-white" id="ssh-close-player-btn" title="プレイヤーを閉じる">
