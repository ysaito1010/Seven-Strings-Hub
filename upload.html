   <form action="php/upload.php" method="POST" enctype="multipart/form-data" class="ssh-track-card p-4 rounded">
  
  <div class="mb-4">
    <label for="musicFile" class="form-label text-dark"><i class="fa-solid fa-file-audio me-2"></i>音源ファイル（mp3のみ）</label>
    <input type="file" class="form-control bg-white text-muted border-secondary" id="musicFile" name="mp3_file" accept=".mp3" required>
  </div>

  <div class="mb-4">
    <label for="track_bpm" class="form-label text-dark"><i class="fa-solid fa-gauge-high me-2"></i>BPM</label>
    <input type="number" class="form-control" id="track_bpm" name="track_bpm" placeholder="例: 135" required>
  </div>

  <div class="mb-4">
    <label for="track_genre" class="form-label text-dark"><i class="fa-solid fa-guitar me-2"></i>GENRE</label>
    <select class="form-select bg-white text-muted border-secondary" id="track_genre" name="track_genre" required>
      <option value="" disabled selected>ジャンルを選択してください</option>
      <option value="Djent / Progressive Metal">Ballade</option>
      <option value="Cyber Metal / Synthwave">Pops</option>
      <option value="Atmospheric Ambient Rock">Metal</option>
      <option value="Hard Rock / Metalcore">Hard Rock</option>
    </select>
  </div>

  <div class="mb-4">
    <label for="track_duration" class="form-label text-dark"><i class="fa-regular fa-clock me-2"></i>DURATION (分:秒)</label>
    <input type="text" class="form-control" id="track_duration" name="track_duration" placeholder="例: 02:45" pattern="^[0-9]{2}:[0-9]{2}$" title="「02:45」のように 分分:秒秒 の形式で入力してください" required>
    </div>

    <div class="mb-4">
    <label for="track_desc" class="form-label text-dark"><i class="fa-solid fa-pen-to-square me-2"></i>DESCRIPTION (曲紹介文)</label>
    <textarea class="form-control bg-white text-muted border-secondary" id="track_desc" name="track_desc" rows="3" placeholder="曲のコンセプトや聴きどころを入力してください" required></textarea>
  </div>

  <div class="mb-4">
    <label for="uploadPassword" class="form-label text-dark"><i class="fa-solid fa-lock me-2"></i>管理者パスワード</label>
    <input type="password" class="form-control bg-white text-muted border-secondary" id="uploadPassword" name="upload_password" placeholder="パスワードを入力" required>
  </div>

  <button type="submit" class="btn ssh-btn-outline w-100 fw-bold text-info"><i class="fa-solid fa-cloud-arrow-up me-2"></i>サーバーへ送信</button>

</form>
